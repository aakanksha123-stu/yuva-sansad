<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Yuva Sansad Voting</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #fff;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    flex-direction: column;
    padding: 10px;
    box-sizing: border-box;
  }

  .container {
    text-align: center;
    background: #ffffff;
    border: 2px solid orange;
    border-radius: 15px;
    padding: 20px;
    width: 100%;
    max-width: 400px; /* responsive max width */
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    box-sizing: border-box;
  }

  h1 {
    color: orange;
    font-size: 1.8rem;
    margin-bottom: 15px;
  }

  .question {
    margin: 15px 0;
    font-size: 1.1rem;
  }

  button {
    padding: 12px 20px;
    margin: 10px 5px;
    border-radius: 25px;
    border: none;
    font-size: 1rem;
    cursor: pointer;
    transition: 0.3s;
  }

  button:hover {
    opacity: 0.9;
  }

  .yes {
    background: orange;
    color: white;
  }

  .no {
    background: white;
    color: orange;
    border: 2px solid orange;
  }

  canvas {
    margin-top: 20px;
    width: 100% !important; /* responsive chart width */
    height: auto !important;
  }

  .info {
    margin-top: 8px;
    font-weight: bold;
    font-size: 0.9rem;
  }

  #result {
    margin-top: 10px;
    font-size: 1.1rem;
    font-weight: bold;
  }

  /* 📱 MOBILE MEDIA QUERY */
  @media (max-width: 480px) {
    .container {
      padding: 15px;
    }

    h1 {
      font-size: 1.5rem;
    }

    .question {
      font-size: 1rem;
    }

    button {
      padding: 10px 15px;
      font-size: 0.95rem;
      margin: 8px 3px;
    }

    .info {
      font-size: 0.85rem;
    }

    #result {
      font-size: 1rem;
    }
  }
</style>
</head>

<body>

<div class="container">
  <h1>Yuva Sansad</h1>

  <div class="question">Should this proposal be accepted?</div>

  <div class="info">⏳ Time Left: <span id="timer">30</span>s</div>
  <div class="info">👥 Users Online: <span id="users">1</span></div>

  <button class="yes" onclick="vote('yes')">YES</button>
  <button class="no" onclick="vote('no')">NO</button>

  <p>YES Votes: <span id="yesCount">0</span></p>
  <p>NO Votes: <span id="noCount">0</span></p>

  <div id="result"></div>

  <canvas id="voteChart"></canvas>
</div>
<script>
  console.log("JS Loaded");

  const socket = new WebSocket(
    windown.      otocol === "https:"
      ?       ss://" + window.location.host +        s/vote/"
      : "ws://" + window.loca          ost + "/ws/vote/"
  );

  socket.onopen = () => console.log("✅ Connected");

  let votingClosed = false;
    let latestData = { yes: 0, no: 0, time: 30 };

  //     Reset local vote lock onl    on first page load
  sessionStorage.removeItem("voted");

  // 📊 Chart
  const ctx = document.getEl    entById("voteChart").getContext("2d");

  const voteChart = new Chart(ctx, {
    type: "bar",
    data: {
      labels: [        ES", "NO"],
      datasets: [{
                label: "Votes",
        data: [0, 0],
        backgroundColor: ["orange", "#ddd"],
        borderRadius: 10
      }]
    }
  });

  // 🌍 RECEIVE LIVE SHARED STATE
  socket.onmessage = function(e) {
    const data = JSON.parse(e.data);

    latestData = data;

    document.getElementById("yesCount").innerText = data.yes;
    document.getElementById("noCount").innerText = data.no;
    document.getElementById("users").innerText = data.users || 1;

    // ✅ everyone sees same remaining time
    document.getElementById("timer").innerText = data.time;

    // 🔒 close voting when time is over
    votingClosed = data.time <= 0;

    // 📊 update chart
    voteChart.data.datasets[0].data = [data.yes, data.no];
    voteChart.update();

    // 🏆 show final result from backend
    document.getElementById("result").innerText = data.result || "";

    // 🔓 allow next round vote after manual refresh
    if (data.time === 30) {
      sessionStorage.removeItem("voted");
    }
  };

  // 🟢 Vote button
  function vote(choice) {
    if (votingClosed) {
      alert("Voting has ended!");
      return;
    }

    if (sessionStorage.getItem("voted")) {
      alert("You already voted!");
      return;
    }

    sessionStorage.setItem("voted", "true");

    socket.send(JSON.stringify({
      vote: choice
    }));
  }
</script>
</body>
</html>
