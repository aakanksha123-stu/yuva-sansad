<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Yuva Sansad Voting</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      flex-direction: column;
    }

    .container {
      text-align: center;
      background: #ffffff;
      border: 2px solid orange;
      border-radius: 15px;
      padding: 30px;
      width: 400px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }

    h1 {
      color: orange;
    }

    .question {
      margin: 20px 0;
    }

    button {
      padding: 12px 25px;
      margin: 10px;
      border-radius: 25px;
      border: none;
      font-size: 16px;
      cursor: pointer;
    }

    .yes {
      background: orange;
      color: white;
    }

    .no {
      background: white;
      color: orange;
      border: 2px solid orange;
    }

    canvas {
      margin-top: 20px;
    }

    .info {
      margin-top: 10px;
      font-weight: bold;
    }

    #result {
      margin-top: 10px;
      font-size: 18px;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>Yuva Sansad</h1>

  <div class="question">Should this proposal be accepted?</div>

  <div class="info">⏳ Time Left: <span id="timer">30</span>s</div>
  <div class="info">👥 Users Online: <span id="users">1</span></div>

  <button class="yes" onclick="vote('yes')">YES</button>
  <button class="no" onclick="vote('no')">NO</button>

  <p>YES Votes: <span id="yesCount">0</span></p>
  <p>NO Votes: <span id="noCount">0</span></p>

  <div id="result"></div>

  <canvas id="voteChart"></canvas>
</div>

<script>
  console.log("JS Loaded");

  const socket = new WebSocket(
  window.location.protocol === "https:"
    ? "wss://" + window.location.host + "/ws/vote/"
    : "ws://" + window.location.host + "/ws/vote/"
);
  socket.onopen = () => console.log("✅ Connected");

  let votingClosed = false; // 🔒 control voting

  // 🔄 Reset vote when page loads (new session)
  sessionStorage.removeItem("voted");

  // 📊 Chart
  const ctx = document.getElementById('voteChart').getContext('2d');

  const voteChart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: ['YES', 'NO'],
      datasets: [{
        label: 'Votes',
        data: [0, 0],
        backgroundColor: ['orange', '#ddd'],
        borderRadius: 10
      }]
    }
  });

  // ⏳ TIMER
  let time = 30;

  const timerInterval = setInterval(() => {
    time--;
    document.getElementById("timer").innerText = time;

    if (time <= 0) {
      clearInterval(timerInterval);
      votingClosed = true;

      document.getElementById("result").innerText = "⏰ Voting Closed";

      showFinalResult(); // 🏆 show winner
    }
  }, 1000);

  let latestData = { yes: 0, no: 0 };

  // 🔄 Receive data
  socket.onmessage = function(e) {
    const data = JSON.parse(e.data);

    latestData = data;

    document.getElementById("yesCount").innerText = data.yes;
    document.getElementById("noCount").innerText = data.no;

    // 📊 Update chart
    voteChart.data.datasets[0].data = [data.yes, data.no];
    voteChart.update();

    // 👥 USERS
    document.getElementById("users").innerText = data.users || 1;
  };

  // 🏆 FINAL RESULT
  function showFinalResult() {
    if (latestData.yes > latestData.no) {
      document.getElementById("result").innerText = "✅ PASSED";
    } 
    else if (latestData.no > latestData.yes) {
      document.getElementById("result").innerText = "❌ REJECTED";
    } 
    else {
      document.getElementById("result").innerText = "⚖️ TIE";
    }
  }

  // 🟢 VOTE FUNCTION (UPDATED ✅)
  function vote(choice) {

    if (votingClosed) {
      alert("Voting has ended!");
      return;
    }

    // 🔐 One vote per session (fixed)
    if (sessionStorage.getItem("voted")) {
      alert("You already voted!");
      return;
    }

    sessionStorage.setItem("voted", "true");

    socket.send(JSON.stringify({
      vote: choice
    }));
  }

</script>

</body>
</html>
