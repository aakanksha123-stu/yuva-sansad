<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Yuva Sansad Voting</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #fff;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    flex-direction: column;
    padding: 10px;
  }

  .container {
    text-align: center;
    background: #ffffff;
    border: 2px solid orange;
    border-radius: 15px;
    padding: 20px;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
  }

  h1 {
    color: orange;
  }

  .question {
    margin: 15px 0;
  }

  button {
    padding: 12px 20px;
    margin: 10px 5px;
    border-radius: 25px;
    border: none;
    cursor: pointer;
  }

  .yes {
    background: orange;
    color: white;
  }

  .no {
    background: white;
    color: orange;
    border: 2px solid orange;
  }

  canvas {
    margin-top: 20px;
    width: 100% !important;
  }

  .info {
    margin-top: 8px;
    font-weight: bold;
  }

  #result {
    margin-top: 10px;
    font-weight: bold;
  }
</style>
</head>

<body>

<div class="container">
  <h1>Yuva Sansad</h1>

  <div class="question">Should this proposal be accepted?</div>

  <div class="info">⏳ Time Left: <span id="timer">30</span>s</div>
  <div class="info">👥 Users Online: <span id="users">1</span></div>

  <button class="yes" onclick="vote('yes')">YES</button>
  <button class="no" onclick="vote('no')">NO</button>

  <p>YES Votes: <span id="yesCount">0</span></p>
  <p>NO Votes: <span id="noCount">0</span></p>

  <div id="result"></div>

  <!-- ✅ ONLY ONE CANVAS -->
  <canvas id="voteChart"></canvas>
</div>

  <script>
    console.log("JS Loaded");

    // ✅ Correct WebSocket connection
    const socket = new WebSocket(
      window.location.protocol === "https:"
        ? "wss://" + window.location.host + "/ws/vote/"
        : "ws://" + window.location.host + "/ws/vote/"
    );

    socket.onopen = () => console.log("✅ Connected");
    socket.onerror = (e) => console.log("❌ WebSocket Error:", e);
    socket.onclose = () => console.log("❌ Disconnected");

    let votingClosed = false;
    let latestData = { yes: 0, no: 0, time: 30 };

    // Reset vote lock on page load
    sessionStorage.removeItem("voted");

    // ✅ Chart setup
    const ctx = document.getElementById("voteChart").getContext("2d");

    const voteChart = new Chart(ctx, {
      type: "bar",
      data: {
        labels: ["YES", "NO"],
        datasets: [{
          label: "Votes",
          data: [0, 0],
          backgroundColor: ["orange", "#ddd"],
          borderRadius: 10
        }]
      },
      options: {
        responsive: true,
        scales: {
          y: {
            beginAtZero: true,
            precision: 0
          }
        }
      }
    });

    // ✅ Receive live updates
    socket.onmessage = function(e) {
      const data = JSON.parse(e.data);
      console.log("📩 Data received:", data);

      latestData = data;

      // Update UI
      document.getElementById("yesCount").innerText = data.yes;
      document.getElementById("noCount").innerText = data.no;
      document.getElementById("users").innerText = data.users || 1;
      document.getElementById("timer").innerText = data.time;

      // Close voting
      votingClosed = data.time <= 0;

      // Update chart
      voteChart.data.datasets[0].data = [data.yes, data.no];
      voteChart.update();

      // Show result
      document.getElementById("result").innerText = data.result || "";

      // Reset vote for next round
      if (data.time === 30) {
        sessionStorage.removeItem("voted");
      }
    };

    // ✅ Vote function
    function vote(choice) {
      if (votingClosed) {
        alert("Voting has ended!");
        return;
      }

      if (sessionStorage.getItem("voted")) {
        alert("You already voted!");
        return;
      }

      // Send vote
      socket.send(JSON.stringify({ vote: choice }));

      sessionStorage.setItem("voted", "true");
    }
  </script>
</body>
</html>
